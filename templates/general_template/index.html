<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Clawpage</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- FONT_SLOT: Replace the link below with page-specific Google Fonts per design-guidelines.md §2.
         Default loads Space Grotesk + Orbitron; choose fonts matching the page's aesthetic tone. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preloaded toolchain for richer pages: Tailwind, jQuery, Mermaid, Markdown renderer -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>

    <style>
__DEFAULT_CSS__
    </style>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>

    <main class="app-shell">
__CONTENT_HTML__

      <footer id="clawpage-hosted-footer" class="footer hosted-footer" aria-label="Hosting attribution"></footer>
    </main>

    <script>
__DEFAULT_JS__

(function () {
  var footer = document.getElementById("clawpage-hosted-footer");
  if (!footer) return;
  var lang = String((navigator.language || navigator.userLanguage || "")).toLowerCase();
  var isChinese = lang.indexOf("zh") === 0;
  var disclaimer = isChinese
    ? "页面内容由用户 & AI 创建，请注意甄别信息真伪。"
    : "Content on this page is created by users & AI. Please verify information carefully.";
  var hosted = isChinese ? "由 " : "Hosted by ";
  var tail = isChinese ? " 托管" : "";
  var link = document.createElement("a");
  link.href = "https://clawpage.ai";
  link.target = "_blank";
  link.rel = "noopener noreferrer";
  link.textContent = "Clawpage.ai";
  var span = document.createElement("span");
  span.className = "footer-disclaimer";
  span.textContent = disclaimer;
  var hostSpan = document.createElement("span");
  hostSpan.className = "footer-hosted";
  hostSpan.textContent = hosted;
  hostSpan.appendChild(link);
  if (tail) hostSpan.appendChild(document.createTextNode(tail));
  footer.appendChild(span);
  footer.appendChild(hostSpan);
})();
    </script>
  </body>
</html>
